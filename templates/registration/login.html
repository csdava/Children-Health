{% extends "base.html" %}

{% block title %}登录 - 健康管理{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 450px;
        margin: 80px auto;
        padding: 50px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 30px rgba(0,0,0,0.1);
    }
    .login-title {
        text-align: center;
        font-size: 32px;
        margin-bottom: 10px;
    }
    .login-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 40px;
        font-size: 16px;
    }
    .form-group {
        margin-bottom: 25px;
    }
    .form-group label {
        display: block;
        margin-bottom: 10px;
        color: #333;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
    }
    .form-group input:focus {
        border-color: #4CAF50;
        outline: none;
    }
    .btn-login {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #4CAF50, #81C784);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        margin-top: 15px;
    }
    .btn-login:hover {
        opacity: 0.9;
    }
    .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 25px;
        font-size: 14px;
        text-align: center;
    }
    .register-link {
        text-align: center;
        margin-top: 30px;
        font-size: 15px;
        color: #666;
    }
    .register-link a {
        color: #2196F3;
        text-decoration: none;
        font-weight: 500;
    }
    .register-link a:hover {
        text-decoration: underline;
    }
    .home-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #999;
        font-size: 14px;
        text-decoration: none;
    }
    .home-link:hover {
        color: #666;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <h1 class="login-title">登录</h1>
    <p class="login-subtitle">选择您的角色开始管理</p>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn-login">登录</button>
    </form>

    <div class="register-link">
        还没有账号？<a href="{% url 'register' %}">立即注册</a>
    </div>

    <a href="{% url 'index' %}" class="home-link">← 返回首页</a>
</div>
{% endblock %}
